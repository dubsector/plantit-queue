name: CodeQL

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/codeql.yml'
  pull_request:
  schedule:
    - cron: '0 3 * * 1'  # weekly Monday 03:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  analyze:
    name: Analyze (Java)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: java
          queries: security-and-quality

      - name: Install Plan dependency
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLAN_URL=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/plan-player-analytics/Plan/releases/latest" \
            | python3 -c "import sys,json; assets=json.load(sys.stdin)['assets']; jar=next(a for a in assets if a['name'].startswith('Plan-') and a['name'].endswith('.jar')); print(jar['browser_download_url'])")
          echo "Downloading: $PLAN_URL"
          curl -fsSL "$PLAN_URL" -o Plan.jar
          ls -lh Plan.jar
          mvn install:install-file -Dfile=Plan.jar -DgroupId=com.djrapitops -DartifactId=plan -Dversion=5.7.3306 -Dpackaging=jar
          echo "Plan installed to local Maven cache"

      - name: Build
        run: mvn clean package -DskipTests -q

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: java
