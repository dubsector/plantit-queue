name: PlantIt Queue Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests -q

      - name: Get version
        id: ver
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Get short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Rename JAR
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHORT_SHA: ${{ steps.sha.outputs.short_sha }}
        run: mv target/plantit-queue-*.jar "target/plantit-queue-${VERSION}+${SHORT_SHA}.jar"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: plugin-jar
          path: target/plantit-queue-*.jar

  velocity-smoke-test:
    name: Velocity Smoke Test
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: write
    steps:
      - name: Download built JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: plugin-jar
          path: plugin-jar/

      - name: Resolve latest Velocity build
        id: velocity
        run: |
          VEL_VERSION=$(curl -fsSL "https://api.papermc.io/v2/projects/velocity" | python3 -c "import sys,json; vs=json.load(sys.stdin)['versions']; print(vs[-1])")
          BUILD=$(curl -fsSL "https://api.papermc.io/v2/projects/velocity/versions/${VEL_VERSION}/builds" | python3 -c "import sys,json; builds=json.load(sys.stdin)['builds']; stable=[b for b in builds if b.get('channel','')=='default']; chosen=(stable or builds)[-1]; print(chosen['build'])")
          JAR_NAME=$(curl -fsSL "https://api.papermc.io/v2/projects/velocity/versions/${VEL_VERSION}/builds/${BUILD}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['downloads']['application']['name'])")
          echo "vel_version=${VEL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build=${BUILD}"             >> "$GITHUB_OUTPUT"
          echo "jar_name=${JAR_NAME}"       >> "$GITHUB_OUTPUT"
          echo "Resolved: Velocity ${VEL_VERSION} build ${BUILD} (${JAR_NAME})"

      - name: Download Velocity JAR
        env:
          VEL_VERSION: ${{ steps.velocity.outputs.vel_version }}
          BUILD: ${{ steps.velocity.outputs.build }}
          JAR_NAME: ${{ steps.velocity.outputs.jar_name }}
        run: |
          mkdir -p smoke-proxy/plugins
          curl -fsSL "https://api.papermc.io/v2/projects/velocity/versions/${VEL_VERSION}/builds/${BUILD}/downloads/${JAR_NAME}" \
            -o smoke-proxy/velocity.jar

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Copy plugin JAR
        run: cp plugin-jar/plantit-queue-*.jar smoke-proxy/plugins/plantit-queue.jar

      - name: Write velocity.toml
        run: |
          cat > smoke-proxy/velocity.toml << 'EOF'
          config-version = "2.7"
          bind = "0.0.0.0:25577"
          motd = "Smoke Test"
          show-max-players = 500
          online-mode = false
          force-key-authentication = false
          player-info-forwarding-mode = "NONE"
          announce-forge = false
          kick-existing-players = false
          ping-passthrough = "DISABLED"
          enable-player-address-logging = false

          [servers]
          try = []

          [forced-hosts]

          [advanced]
          compression-threshold = 256
          compression-level = -1
          login-ratelimit = 3000
          connection-timeout = 5000
          read-timeout = 30000
          haproxy-protocol = false
          tcp-fast-open = false
          bungee-plugin-message-channel = true
          show-ping-requests = false
          failover-on-unexpected-server-disconnect = true
          announce-proxy-commands = true
          log-command-executions = false
          log-player-connections = false
          accepts-transfers = false

          [query]
          enabled = false
          EOF

      - name: Start Velocity and wait for ready
        run: |
          cd smoke-proxy
          java -Xms256m -Xmx512m -jar velocity.jar > proxy.log 2>&1 &
          PROXY_PID=$!
          ELAPSED=0
          while [ $ELAPSED -lt 60 ]; do
            sleep 2; ELAPSED=$((ELAPSED + 2))
            if grep -q "Done (" proxy.log 2>/dev/null; then
              echo "Velocity ready after ${ELAPSED}s"
              break
            fi
            if ! kill -0 $PROXY_PID 2>/dev/null; then
              echo "Velocity process exited early after ${ELAPSED}s"
              break
            fi
          done
          kill $PROXY_PID 2>/dev/null || true
          wait $PROXY_PID 2>/dev/null || true

      - name: Assert plugin loaded cleanly
        run: |
          LOG=smoke-proxy/proxy.log
          echo "--- Proxy log ---"
          cat "$LOG"
          echo "--- End log ---"

          if grep -qiE "failed to enable plugin plantit-queue|error.*plantit-queue|plantit-queue.*error|exception in thread" "$LOG"; then
            echo "::error::plantit-queue logged errors on Velocity startup"
            grep -iE "failed to enable plugin plantit-queue|error.*plantit-queue|plantit-queue.*error|exception in thread" "$LOG"
            exit 1
          fi

          if ! grep -qi "plantit queue enabled" "$LOG"; then
            echo "::error::plantit-queue did not log a successful enable message"
            exit 1
          fi

          if ! grep -q "Done (" "$LOG"; then
            echo "::error::Velocity did not reach ready state"
            exit 1
          fi

          echo "Velocity smoke test passed"

      - name: Upload proxy log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: velocity-smoke-log
          path: smoke-proxy/proxy.log
          retention-days: 7

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build, velocity-smoke-test]
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: plugin-jar
          path: plugin-jar/

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          printf 'Built from [%s](https://github.com/${{ github.repository }}/commit/%s)\n\n**Requires:** Velocity 3.3.x · Java 21\n' \
            "$SHORT_SHA" "$GITHUB_SHA" > release-notes.md

          gh release create "build-${SHORT_SHA}" \
            --repo ${{ github.repository }} \
            --title "plantit-queue ${VERSION} (${SHORT_SHA})" \
            --notes-file release-notes.md \
            plugin-jar/plantit-queue-*.jar
