name: PlantIt Queue Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Plan dependency
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLAN_URL=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/plan-player-analytics/Plan/releases/latest" \
            | python3 -c "import sys,json; assets=json.load(sys.stdin)['assets']; jar=next(a for a in assets if a['name'].startswith('Plan-') and a['name'].endswith('.jar')); print(jar['browser_download_url'])")
          echo "Downloading: $PLAN_URL"
          curl -fsSL "$PLAN_URL" -o Plan.jar
          ls -lh Plan.jar
          mvn install:install-file -Dfile=Plan.jar -DgroupId=com.djrapitops -DartifactId=plan -Dversion=5.7.3306 -Dpackaging=jar
          echo "Plan installed to local Maven cache"

      - name: Build with Maven
        run: mvn clean package -DskipTests -q

      - name: Get version
        id: ver
        run: echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Get short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Rename JAR
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHORT_SHA: ${{ steps.sha.outputs.short_sha }}
        run: mv target/plantit-queue-*.jar "target/plantit-queue-${VERSION}+${SHORT_SHA}.jar"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plugin-jar
          path: target/plantit-queue-*.jar

  velocity-smoke-test:
    name: Velocity Smoke Test
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: write
    steps:
      - name: Download built JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: plugin-jar
          path: plugin-jar/

      - name: Resolve and download Velocity JAR
        run: |
          VEL_VERSION=$(curl -fsSL "https://api.papermc.io/v2/projects/velocity" \
            | python3 -c "import sys,json; vs=json.load(sys.stdin)['versions']; print(vs[-1])")
          BUILD=$(curl -fsSL "https://api.papermc.io/v2/projects/velocity/versions/${VEL_VERSION}/builds" \
            | python3 -c "import sys,json; builds=json.load(sys.stdin)['builds']; stable=[b for b in builds if b.get('channel','')=='default']; chosen=(stable or builds)[-1]; print(chosen['build'])")
          JAR_NAME="velocity-${VEL_VERSION}-${BUILD}.jar"
          echo "Resolved: Velocity ${VEL_VERSION} build ${BUILD} (${JAR_NAME})"
          mkdir -p smoke-proxy/plugins
          curl -fsSL "https://api.papermc.io/v2/projects/velocity/versions/${VEL_VERSION}/builds/${BUILD}/downloads/${JAR_NAME}" \
            -o smoke-proxy/velocity.jar

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Copy plugin JAR
        run: cp plugin-jar/plantit-queue-*.jar smoke-proxy/plugins/plantit-queue.jar

      - name: Write velocity.toml
        run: |
          cat > smoke-proxy/velocity.toml << 'EOF'
          config-version = "2.7"
          bind = "0.0.0.0:25577"
          motd = "Smoke Test"
          show-max-players = 500
          online-mode = false
          force-key-authentication = false
          player-info-forwarding-mode = "NONE"
          announce-forge = false
          kick-existing-players = false
          ping-passthrough = "DISABLED"
          enable-player-address-logging = false

          [servers]
          try = []

          [forced-hosts]

          [advanced]
          compression-threshold = 256
          compression-level = -1
          login-ratelimit = 3000
          connection-timeout = 5000
          read-timeout = 30000
          haproxy-protocol = false
          tcp-fast-open = false
          bungee-plugin-message-channel = true
          show-ping-requests = false
          failover-on-unexpected-server-disconnect = true
          announce-proxy-commands = true
          log-command-executions = false
          log-player-connections = false
          accepts-transfers = false

          [query]
          enabled = false
          EOF

      - name: Start Velocity and wait for ready
        run: |
          cd smoke-proxy
          java -Xms256m -Xmx512m -jar velocity.jar > proxy.log 2>&1 &
          PROXY_PID=$!
          ELAPSED=0
          while [ $ELAPSED -lt 60 ]; do
            sleep 2; ELAPSED=$((ELAPSED + 2))
            if grep -q "Done (" proxy.log 2>/dev/null; then
              echo "Velocity ready after ${ELAPSED}s"
              break
            fi
            if ! kill -0 $PROXY_PID 2>/dev/null; then
              echo "Velocity process exited early after ${ELAPSED}s"
              break
            fi
          done
          kill $PROXY_PID 2>/dev/null || true
          wait $PROXY_PID 2>/dev/null || true

      - name: Assert plugin loaded cleanly
        run: |
          LOG=smoke-proxy/proxy.log
          echo "--- Proxy log ---"
          cat "$LOG"
          echo "--- End log ---"

          if grep -qiE "failed to enable plugin plantit-queue|error.*plantit-queue|plantit-queue.*error|exception in thread" "$LOG"; then
            echo "::error::plantit-queue logged errors on Velocity startup"
            grep -iE "failed to enable plugin plantit-queue|error.*plantit-queue|plantit-queue.*error|exception in thread" "$LOG"
            exit 1
          fi

          if ! grep -qi "plantit queue enabled" "$LOG"; then
            echo "::error::plantit-queue did not log a successful enable message"
            exit 1
          fi

          if grep -qi "debug mode is enabled" "$LOG"; then
            echo "::warning::Debug mode is enabled in the smoke test build — disable before release"
          fi

          if ! grep -q "Done (" "$LOG"; then
            echo "::error::Velocity did not reach ready state"
            exit 1
          fi

          echo "Velocity smoke test passed"

      - name: Upload proxy log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: velocity-smoke-log
          path: smoke-proxy/proxy.log
          retention-days: 7

  velocity-smoke-test-plan:
    name: Velocity Smoke Test (with Plan)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: write
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: plantest
          MYSQL_DATABASE: plan
          MYSQL_USER: plan
          MYSQL_PASSWORD: plantest
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u plan -pplantest"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Download built JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: plugin-jar
          path: plugin-jar/

      - name: Resolve and download Velocity JAR
        run: |
          VEL_VERSION=$(curl -fsSL "https://api.papermc.io/v2/projects/velocity" \
            | python3 -c "import sys,json; vs=json.load(sys.stdin)['versions']; print(vs[-1])")
          BUILD=$(curl -fsSL "https://api.papermc.io/v2/projects/velocity/versions/${VEL_VERSION}/builds" \
            | python3 -c "import sys,json; builds=json.load(sys.stdin)['builds']; stable=[b for b in builds if b.get('channel','')=='default']; chosen=(stable or builds)[-1]; print(chosen['build'])")
          JAR_NAME="velocity-${VEL_VERSION}-${BUILD}.jar"
          echo "Resolved: Velocity ${VEL_VERSION} build ${BUILD} (${JAR_NAME})"
          mkdir -p smoke-proxy/plugins
          curl -fsSL "https://api.papermc.io/v2/projects/velocity/versions/${VEL_VERSION}/builds/${BUILD}/downloads/${JAR_NAME}" \
            -o smoke-proxy/velocity.jar

      - name: Download Plan JAR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PLAN_URL=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/plan-player-analytics/Plan/releases/latest" \
            | python3 -c "import sys,json; assets=json.load(sys.stdin)['assets']; jar=next(a for a in assets if a['name'].startswith('Plan-') and a['name'].endswith('.jar')); print(jar['browser_download_url'])")
          echo "Downloading Plan from: $PLAN_URL"
          curl -fsSL "$PLAN_URL" -o smoke-proxy/plugins/Plan.jar

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Copy plugin JAR
        run: cp plugin-jar/plantit-queue-*.jar smoke-proxy/plugins/plantit-queue.jar

      - name: Write Plan config
        run: |
          mkdir -p smoke-proxy/plugins/plan
          python3 - << 'PYEOF'
          import textwrap, pathlib
          cfg = textwrap.dedent("""\
          Server:
              ServerName: "Smoke Test"
          Webserver:
              Port: 25132
              InternalIP: 0.0.0.0
              Security:
                  SSL_mode: false
          Database:
              Type: MySQL
              MySQL:
                  Host: 127.0.0.1
                  Port: 3306
                  User: plan
                  Password: plantest
                  Database: plan
                  Launch_options: "?rewriteBatchedStatements=true&useSSL=false&serverTimezone=UTC"
                  Max_connections: 8
          """)
          pathlib.Path("smoke-proxy/plugins/plan/config.yml").write_text(cfg)
          print("Plan config written")
          PYEOF

      - name: Write velocity.toml
        run: |
          cat > smoke-proxy/velocity.toml << 'EOF'
          config-version = "2.7"
          bind = "0.0.0.0:25577"
          motd = "Smoke Test"
          show-max-players = 500
          online-mode = false
          force-key-authentication = false
          player-info-forwarding-mode = "NONE"
          announce-forge = false
          kick-existing-players = false
          ping-passthrough = "DISABLED"
          enable-player-address-logging = false

          [servers]
          try = []

          [forced-hosts]

          [advanced]
          compression-threshold = 256
          compression-level = -1
          login-ratelimit = 3000
          connection-timeout = 5000
          read-timeout = 30000
          haproxy-protocol = false
          tcp-fast-open = false
          bungee-plugin-message-channel = true
          show-ping-requests = false
          failover-on-unexpected-server-disconnect = true
          announce-proxy-commands = true
          log-command-executions = false
          log-player-connections = false
          accepts-transfers = false

          [query]
          enabled = false
          EOF

      - name: Start Velocity and wait for ready
        run: |
          cd smoke-proxy
          java -Xms256m -Xmx512m -jar velocity.jar > proxy.log 2>&1 &
          PROXY_PID=$!
          ELAPSED=0
          while [ $ELAPSED -lt 60 ]; do
            sleep 2; ELAPSED=$((ELAPSED + 2))
            if grep -q "Done (" proxy.log 2>/dev/null; then
              echo "Velocity ready after ${ELAPSED}s"
              break
            fi
            if ! kill -0 $PROXY_PID 2>/dev/null; then
              echo "Velocity process exited early after ${ELAPSED}s"
              break
            fi
          done
          kill $PROXY_PID 2>/dev/null || true
          wait $PROXY_PID 2>/dev/null || true

      - name: Assert plugin loaded and Plan hooked
        run: |
          LOG=smoke-proxy/proxy.log
          echo "--- Proxy log ---"
          cat "$LOG"
          echo "--- End log ---"

          if grep -qiE "failed to enable plugin plantit-queue|error.*plantit-queue|plantit-queue.*error|exception in thread" "$LOG"; then
            echo "::error::plantit-queue logged errors on Velocity startup"
            grep -iE "failed to enable plugin plantit-queue|error.*plantit-queue|plantit-queue.*error|exception in thread" "$LOG"
            exit 1
          fi

          if ! grep -qi "plantit queue enabled" "$LOG"; then
            echo "::error::plantit-queue did not log a successful enable message"
            exit 1
          fi

          if ! grep -qi "hooked into plan" "$LOG"; then
            echo "::error::Plan was installed but plantit-queue did not hook into it"
            exit 1
          fi

          if ! grep -q "Done (" "$LOG"; then
            echo "::error::Velocity did not reach ready state"
            exit 1
          fi

          echo "Velocity smoke test with Plan passed"

      - name: Upload proxy log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: velocity-smoke-log-plan
          path: smoke-proxy/proxy.log
          retention-days: 7

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build, velocity-smoke-test, velocity-smoke-test-plan]
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: plugin-jar
          path: plugin-jar/

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          VERSION: ${{ needs.build.outputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          printf '> [!WARNING]\n> **Use at your own risk.** This is an automated pre-release build and may be unstable. Not recommended for production use.\n\nBuilt from [%s](https://github.com/${{ github.repository }}/commit/%s)\n\n**Requires:** Velocity 3.5.x · Java 21\n' \
            "$SHORT_SHA" "$GITHUB_SHA" > release-notes.md

          gh release create "build-${RUN_NUMBER}" \
            --repo ${{ github.repository }} \
            --title "plantit-queue ${VERSION} build ${RUN_NUMBER} (${SHORT_SHA})" \
            --notes-file release-notes.md \
            --prerelease \
            plugin-jar/plantit-queue-*.jar
